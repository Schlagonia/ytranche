[profile.default]
src = 'src'
script = 'script'
out = 'out'
libs = ['lib']
solc = "0.8.23"
optimizer = true
optimizer_runs = 200
ffi = true
fs_permissions = [{ access = "read", path = "./" }]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "@tokenized-strategy/=lib/tokenized-strategy/src/",
    "@periphery/=lib/tokenized-strategy-periphery/src/",
    "@yearn-vaults/=lib/yearn-vaults-v3/contracts/"
]

# Stateful invariant runs. Handler is revert-safe so reverts surface as findings.
# Raise runs/depth for nightly; kept modest here because each call drives the
# local invariant main-vault harness.
[invariant]
runs = 256
depth = 50
fail_on_revert = true
call_override = false
shrink_run_limit = 5000

# See more config options https://github.com/foundry-rs/foundry/tree/master/config
